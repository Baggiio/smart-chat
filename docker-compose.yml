services:
  postgres:
    image: pgvector/pgvector:0.8.3-pg16-bookworm
    container_name: smart-chat-postgres

    environment:
      POSTGRES_USER: smart_chat
      POSTGRES_PASSWORD: smart_chat
      POSTGRES_DB: smart_chat

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U smart_chat -d smart_chat",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped

volumes:
  postgres_data: